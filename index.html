<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 遙測數據深度分析與自動整理0056</title>
    <style>
        :root {
            --primary-color: #e10600; /* F1 經典紅 */
            --bg-color: #15151e; /* F1 官網深色底 */
            --card-bg: #1f1f2a;
            --table-header: #2b2b36;
            --text-color: #f5f5f7;
            --text-muted: #a0a0a8;
            --accent-blue: #00bfff;
            --accent-green: #00ff7f;
            --accent-warning: #ffb300;
        }

        body {
            font-family: "Formula1-Regular", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
        }

        h1 { margin: 0 0 10px 0; font-size: 2.2rem; letter-spacing: 1px; }
        .subtitle { color: var(--text-muted); margin: 0; font-size: 1.1rem; }
        
        .track-badge {
            display: inline-block;
            background-color: #333;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 8px;
            border: 1px solid var(--primary-color);
        }

        /* 上傳控制區 */
        .upload-section {
            background-color: var(--card-bg);
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: #333;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .custom-file-upload:hover { background-color: #444; }
        input[type="file"] { display: none; }

        .btn-analyze {
            display: inline-block;
            padding: 12px 40px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-analyze:hover { background-color: #b80500; }
        
        .file-list-preview {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 4px;
        }

        /* 儀表板區塊 */
        .dashboard-section {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none;
        }

        .section-title {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
        }

        .section-title span { margin-right: 10px; }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            text-align: left;
        }

        th {
            background-color: var(--table-header);
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #2d2d3d;
            font-size: 0.95rem;
        }

        tr:hover td { background-color: rgba(255, 255, 255, 0.03); }

        .fastest-lap-glow {
            color: #b026ff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(176, 38, 255, 0.5);
        }

        .q-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #000;
        }
        .q1-bg { background-color: #ff4500; color: #fff; }
        .q2-bg { background-color: #ff8c00; color: #fff; }
        .q3-bg { background-color: var(--accent-blue); }

        .placeholder-text {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>F1 遙測數據分析儀表板</h1>
        <div class="subtitle" id="track-display">目前賽道：<span class="track-badge">等待數據上傳...</span></div>
    </header>

    <div class="upload-section">
        <div class="file-input-wrapper">
            <label for="telemetry-files" class="custom-file-upload">📂 選擇遙測數據 JSON 檔案 (可多選)</label>
            <input type="file" id="telemetry-files" accept=".json" multiple>
        </div>
        <div id="file-list-preview" class="file-list-preview">尚未選取任何檔案，請上傳 Qualifying 或 Race 的 JSON。</div>
        <button id="btn-analyze" class="btn-analyze">開始分析數據</button>
    </div>

    <div id="waiting-placeholder" class="placeholder-text">
        請先上傳檔案並按下「開始分析數據」按鈕來生成成績表與識別賽道。
    </div>

    <div id="section-race-results" class="dashboard-section">
        <div class="section-title"><span>🏁</span> 正賽最終完賽成績 (Race Results)</div>
        <table id="table-race">
            <thead>
                <tr>
                    <th>位置 (POS)</th>
                    <th>車手</th>
                    <th>車隊</th>
                    <th>進站次數</th>
                    <th>最快單圈</th>
                    <th>總時間/差距</th>
                    <th>裁決罰時</th>
                    <th>獲得積分</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="section-quali-combined" class="dashboard-section">
        <div class="section-title"><span>⏱️</span> 排位賽綜合結果 (Quali Combined)</div>
        <table id="table-quali-combined">
            <thead>
                <tr>
                    <th>最終排名</th>
                    <th>車手</th>
                    <th>車隊</th>
                    <th>Q1 最快圈</th>
                    <th>Q2 最快圈</th>
                    <th>Q3 最快圈</th>
                    <th>最高階段</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="section-quali-stages" class="dashboard-section">
        <div class="section-title"><span>📊</span> 排位賽各階段最快圈速榜 (Q1 / Q2 / Q3)</div>
        <table id="table-quali-stages">
            <thead>
                <tr>
                    <th>階段</th>
                    <th>排名</th>
                    <th>車手</th>
                    <th>車隊</th>
                    <th>圈速</th>
                    <th>與榜首差距</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const fileInput = document.getElementById('telemetry-files');
    const fileListPreview = document.getElementById('file-list-preview');
    const btnAnalyze = document.getElementById('btn-analyze');
    const waitingPlaceholder = document.getElementById('waiting-placeholder');
    const trackDisplay = document.getElementById('track-display');
    
    const sections = {
        raceResults: document.getElementById('section-race-results'),
        qualiCombined: document.getElementById('section-quali-combined'),
        qualiStages: document.getElementById('section-quali-stages')
    };

    const TRACK_MAP = {
        23: "巴庫 Baku (亞塞拜然)",
        0: "墨爾本 Albert Park (澳洲)",
        2: "上海國際賽車場 (中國)",
        3: "薩基爾 Sakhir (巴林)",
        5: "摩納哥 Monaco (摩納哥)",
        7: "銀石 Silverstone (英國)",
        10: "斯帕 Spa-Francorchamps (比利時)",
        11: "蒙扎 Monza (義大利)",
        12: "新加坡濱海灣 Marina Bay (新加坡)",
        13: "鈴木 Suzuka (日本)"
    };

    // 監聽：當選擇檔案變更時觸發
    fileInput.addEventListener('change', function() {
        const files = fileInput.files;
        console.log("偵測到檔案選擇，數量:", files.length);
        
        if (files.length === 0) {
            fileListPreview.textContent = "尚未選取任何檔案。";
            return;
        }
        let names = Array.from(files).map(f => `• ${f.name} (${(f.size/1024).toFixed(1)} KB)`);
        fileListPreview.innerHTML = `<strong>已成功選入 ${files.length} 個檔案（請按下下方按鈕開始分析）：</strong><br>` + names.join('<br>');
    });

    // 監聽：點擊分析按鈕
    btnAnalyze.addEventListener('click', function() {
        const files = fileInput.files;
        console.log("點擊分析按鈕，當前選中檔案數:", files.length);

        if (!files || files.length === 0) {
            alert('錯誤：請先點擊上方「選擇遙測數據」選入你的 JSON 檔案！');
            return;
        }
        
        let raceData = null;
        let q1Data = null, q2Data = null, q3Data = null;
        let filesLoaded = 0;
        let detectedTrackName = "";

        // 隱藏歡迎文字
        waitingPlaceholder.style.display = 'none';

        Array.from(files).forEach(file => {
            console.log("開始讀取檔案:", file.name);
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    const name = file.name.toLowerCase();
                    console.log(`檔案 ${file.name} JSON 解析成功`);
                    
                    // 分流
                    if (name.includes('race')) { raceData = json; console.log("識別為正賽數據"); }
                    else if (name.includes('qualifying_1') || name.includes('q1')) { q1Data = json; console.log("識別為 Q1 數據"); }
                    else if (name.includes('qualifying_2') || name.includes('q2')) { q2Data = json; console.log("識別為 Q2 數據"); }
                    else if (name.includes('qualifying_3') || name.includes('q3')) { q3Data = json; console.log("識別為 Q3 數據"); }

                    // 賽道識別
                    if (json["session-data"] && json["session-data"]["track-id"] !== undefined) {
                        detectedTrackName = TRACK_MAP[json["session-data"]["track-id"]];
                    }
                    if (!detectedTrackName && name.includes('baku')) {
                        detectedTrackName = "巴庫 Baku (亞塞拜然)";
                    }

                    filesLoaded++;
                    
                    // 所有上傳的檔案都載入並讀取完成後進行渲染
                    if (filesLoaded === files.length) {
                        if (!detectedTrackName) detectedTrackName = "巴庫 Baku (亞塞拜然)";
                        trackDisplay.innerHTML = `目前賽道：<span class="track-badge">📍 ${detectedTrackName}</span>`;
                        
                        console.log("所有上傳檔案讀取完畢，開始生成報表...");
                        processAndRender(raceData, q1Data, q2Data, q3Data);
                    }
                } catch (err) {
                    console.error("JSON 解析錯誤:", err);
                    alert(`檔案 [${file.name}] 解析出錯！請確保它是標準的 JSON 文字檔案。錯誤訊息: ${err.message}`);
                }
            };

            reader.onerror = function() {
                console.error("檔案讀取失敗");
                alert(`讀取檔案 [${file.name}] 時發生瀏覽器底層錯誤。`);
            };

            // 以文字檔格式讀取
            reader.readAsText(file);
        });
    });

    function formatLapTime(timeInSec) {
        if (!timeInSec || timeInSec <= 0) return "---";
        const min = Math.floor(timeInSec / 60);
        const sec = (timeInSec % 60).toFixed(3);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function formatTotalTime(ms) {
        if (!ms) return "---";
        const totalSec = ms / 1000;
        const hr = Math.floor(totalSec / 3600);
        const min = Math.floor((totalSec % 3600) / 60);
        const sec = (totalSec % 60).toFixed(3);
        return `${hr > 0 ? hr + ':' : ''}${min < 10 && hr > 0 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function processAndRender(race, q1, q2, q3) {
        // --- 1. 正賽數據渲染 ---
        if (race && race["classification-data"]) {
            sections.raceResults.style.display = 'block';
            const tbodyRace = document.querySelector('#table-race tbody');
            tbodyRace.innerHTML = '';
            
            const f1Points = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
            const raceControl = race["race-control"] || [];

            let pitCounts = {};
            let penaltyTimes = {};
            
            raceControl.forEach(log => {
                const driverName = log["driver-info"] ? log["driver-info"]["name"] : null;
                if (!driverName) return;
                if (log["message-type"] === "PITTING") {
                    pitCounts[driverName] = (pitCounts[driverName] || 0) + 1;
                }
                if (log["message-type"] === "PENALTY" && log["penalty-duration"]) {
                    penaltyTimes[driverName] = (penaltyTimes[driverName] || 0) + log["penalty-duration"];
                }
            });

            let driversList = [...race["classification-data"]];
            driversList.sort((a, b) => (a["track-position"] || 99) - (b["track-position"] || 99]);

            let sessionBestLap = Infinity;
            let sessionBestLapDriver = "";
            driversList.forEach(car => {
                const bLap = car["best-lap-time"] || (car["car-status"] ? car["car-status"]["best-lap-time"] : 0);
                if (bLap > 0 && bLap < sessionBestLap) {
                    sessionBestLap = bLap;
                    sessionBestLapDriver = car["driver-name"];
                }
            });

            const winnerTotalTime = driversList[0] ? driversList[0]["total-race-time"] : 0;

            driversList.forEach((car, idx) => {
                const pos = car["track-position"] || (idx + 1);
                const name = car["driver-name"] || `車手 #${car["index"]}`;
                const team = car["team"] || "未指定";
                
                const pits = pitCounts[name] || 0;
                const penaltySec = penaltyTimes[name] || 0;
                const penaltyStr = penaltySec > 0 ? `${penaltySec}秒` : "無";

                const bLapTime = car["best-lap-time"] || (car["car-status"] ? car["car-status"]["best-lap-time"] : 0);
                let fastestLapStr = formatLapTime(bLapTime);
                if (name === sessionBestLapDriver && bLapTime > 0) {
                    fastestLapStr = `<span class="fastest-lap-glow">⚡ ${fastestLapStr}</span>`;
                }

                let gapStr = "---";
                if (pos === 1) {
                    gapStr = car["total-race-time"] ? formatTotalTime(car["total-race-time"]) : "Leader";
                } else {
                    if (car["is-retired"] || car["result-status"] === "RETIRED") {
                        gapStr = "<span style='color:var(--primary-color)'>DNF</span>";
                    } else if (car["laps-behind"] && car["laps-behind"] > 0) {
                        gapStr = `+${car["laps-behind"]} Lap${car["laps-behind"] > 1 ? 's' : ''}`;
                    } else if (car["total-race-time"] && winnerTotalTime) {
                        const diffSec = (car["total-race-time"] - winnerTotalTime) / 1000;
                        gapStr = `+${diffSec.toFixed(3)}s`;
                    }
                }

                const pts = pos <= 10 && gapStr !== "DNF" ? f1Points[pos - 1] : 0;

                tbodyRace.innerHTML += `
                    <tr>
                        <td><strong>P${pos}</strong></td>
                        <td>${name}</td>
                        <td>${team}</td>
                        <td>${pits}</td>
                        <td>${fastestLapStr}</td>
                        <td>${gapStr}</td>
                        <td><span style="color:${penaltyStr !== '無' ? 'var(--accent-warning)' : 'inherit'}">${penaltyStr}</span></td>
                        <td><span style="color:var(--accent-green);font-weight:bold">${pts}</span></td>
                    </tr>
                `;
            });
        }

        // --- 2 & 3. 排位賽數據渲染 ---
        if (q1 || q2 || q3) {
            sections.qualiCombined.style.display = 'block';
            sections.qualiStages.style.display = 'block';
            
            const tbodyCombined = document.querySelector('#table-quali-combined tbody');
            const tbodyStages = document.querySelector('#table-quali-stages tbody');
            tbodyCombined.innerHTML = '';
            tbodyStages.innerHTML = '';

            let combinedDrivers = {};

            const parseQualiStage = (stageData, stageName) => {
                if (!stageData || !stageData["classification-data"]) return;
                stageData["classification-data"].forEach(car => {
                    const name = car["driver-name"];
                    if (!combinedDrivers[name]) {
                        combinedDrivers[name] = { name: name, team: car["team"], q1: 0, q2: 0, q3: 0, maxStage: "Q1" };
                    }
                    const bestLap = car["best-lap-time"] || (car["car-status"] ? car["car-status"]["best-lap-time"] : 0);
                    if (bestLap > 0) {
                        combinedDrivers[name][stageName] = bestLap;
                        combinedDrivers[name].maxStage = stageName.toUpperCase();
                    }
                });
            };

            parseQualiStage(q1, 'q1');
            parseQualiStage(q2, 'q2');
            parseQualiStage(q3, 'q3');

            let sortedQuali = Object.values(combinedDrivers).sort((a, b) => {
                if (a.q3 && b.q3) return a.q3 - b.q3;
                if (a.q3 && !b.q3) return -1;
                if (!a.q3 && b.q3) return 1;
                if (a.q2 && b.q2) return a.q2 - b.q2;
                if (a.q2 && !b.q2) return -1;
                if (!a.q2 && b.q2) return 1;
                return (a.q1 || 999) - (b.q1 || 999);
            });

            sortedQuali.forEach((d, idx) => {
                tbodyCombined.innerHTML += `
                    <tr>
                        <td><strong>${idx + 1}</strong></td>
                        <td>${d.name}</td>
                        <td>${d.team}</td>
                        <td>${formatLapTime(d.q1)}</td>
                        <td>${formatLapTime(d.q2)}</td>
                        <td>${formatLapTime(d.q3)}</td>
                        <td><span class="q-badge ${d.maxStage==='Q3'?'q3-bg':d.maxStage==='Q2'?'q2-bg':'q1-bg'}">${d.maxStage}</span></td>
                    </tr>
                `;
            });

            const renderStageTable = (stageKey, stageLabel) => {
                let stageDrivers = Object.values(combinedDrivers)
                    .filter(d => d[stageKey] > 0)
                    .sort((a, b) => a[stageKey] - b[stageKey]);
                
                const stageLeaderTime = stageDrivers[0] ? stageDrivers[0][stageKey] : 0;

                stageDrivers.forEach((d, idx) => {
                    const gap = idx === 0 ? "P1 榜首" : `+${(d[stageKey] - stageLeaderTime).toFixed(3)}s`;
                    tbodyStages.innerHTML += `
                        <tr>
                            <td><strong>${stageLabel}</strong></td>
                            <td>${idx + 1}</td>
                            <td>${d.name}</td>
                            <td>${d.team}</td>
                            <td>${formatLapTime(d[stageKey])}</td>
                            <td style="color:${idx===0?'var(--accent-green)':'inherit'}">${gap}</td>
                        </tr>
                    `;
                });
            };

            renderStageTable('q1', 'Q1 階段');
            renderStageTable('q2', 'Q2 階段');
            renderStageTable('q3', 'Q3 階段');
        }
    }
</script>

</body>
</html>
