<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 遙測數據深度分析與自動整理2332</title>
    <style>
        :root {
            --primary-color: #e10600; /* F1 經典紅 */
            --bg-color: #15151e; /* F1 官網深色底 */
            --card-bg: #1f1f2a;
            --table-header: #2b2b36;
            --text-color: #f5f5f7;
            --text-muted: #a0a0a8;
            --accent-blue: #00bfff;
            --accent-green: #00ff7f;
            --accent-warning: #ffb300;
        }

        body {
            font-family: "Formula1-Regular", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        。container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
        }

        h1 { margin: 0 0 10px 0; font-size: 2.2rem; letter-spacing: 1px; }
        .subtitle { color: var(--text-muted); margin: 0; }

        /* 上傳控制區 */
        .upload-section {
            background-color: var(--card-bg);
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: #333;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .custom-file-upload:hover { background-color: #444; }
        input[type="file"] { display: none; }

        .btn-analyze {
            display: inline-block;
            padding: 12px 40px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-analyze:hover { background-color: #b80500; }
        
        .file-list-preview {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 4px;
        }

        /* 儀表板區塊 */
        .dashboard-section {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none; /* 預設隱藏，分析後才顯示 */
        }

        .section-title {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
        }

        .section-title span { margin-right: 10px; }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            text-align: left;
        }

        th {
            background-color: var(--table-header);
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #2d2d3d;
            font-size: 0.95rem;
        }

        tr:hover td { background-color: rgba(255, 255, 255, 0.03); }

        /* 排位賽標籤 */
        .q-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #000;
        }
        .q1-bg { background-color: #ff4500; color: #fff; }
        .q2-bg { background-color: #ff8c00; color: #fff; }
        .q3-bg { background-color: var(--accent-blue); }

        .placeholder-text {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>F1 遙測數據分析儀表板</h1>
        <p class="subtitle">自動整理分類與統計 (巴庫賽道數據源)</p>
    </header>

    <div class="upload-section">
        <div class="file-input-wrapper">
            <label for="telemetry-files" class="custom-file-upload">📂 選擇遙測數據 JSON 檔案 (可多選)</label>
            <input type="file" id="telemetry-files" accept=".json" multiple>
        </div>
        <div id="file-list-preview" class="file-list-preview">尚未選取任何檔案，請上傳 Qualifying 或 Race 的 JSON。</div>
        <button id="btn-analyze" class="btn-analyze">開始分析數據</button>
    </div>

    <div id="waiting-placeholder" class="placeholder-text">
        請先上傳檔案並按下「開始分析數據」按鈕來生成成績表。
    </div>

    <div id="section-race-results" class="dashboard-section">
        <div class="section-title"><span>🏁</span> 正賽最終完賽成績 (Race Results)</div>
        <table id="table-race">
            <thead>
                <tr>
                    <th>位置 (POS)</th>
                    <th>車手</th>
                    <th>車隊</th>
                    <th>進站次數</th>
                    <th>最快單圈</th>
                    <th>總時間/差距</th>
                    <th>裁決罰時</th>
                    <th>獲得積分</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="section-quali-combined" class="dashboard-section">
        <div class="section-title"><span>⏱️</span> 排位賽綜合結果 (Quali Combined)</div>
        <table id="table-quali-combined">
            <thead>
                <tr>
                    <th>最終排名</th>
                    <th>車手</th>
                    <th>車隊</th>
                    <th>Q1 最快圈</th>
                    <th>Q2 最快圈</th>
                    <th>Q3 最快圈</th>
                    <th>最高階段</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="section-quali-stages" class="dashboard-section">
        <div class="section-title"><span>📊</span> 排位賽各階段最快圈速榜 (Q1 / Q2 / Q3)</div>
        <table id="table-quali-stages">
            <thead>
                <tr>
                    <th>階段</th>
                    <th>排名</th>
                    <th>車手</th>
                    <th>車隊</th>
                    <th>圈速</th>
                    <th>與榜首差距</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const fileInput = document.getElementById('telemetry-files');
    const fileListPreview = document.getElementById('file-list-preview');
    const btnAnalyze = document.getElementById('btn-analyze');
    const waitingPlaceholder = document.getElementById('waiting-placeholder');
    
    const sections = {
        raceResults: document.getElementById('section-race-results'),
        qualiCombined: document.getElementById('section-quali-combined'),
        qualiStages: document.getElementById('section-quali-stages')
    };

    fileInput.addEventListener('change', function() {
        const files = fileInput.files;
        if (files.length === 0) {
            fileListPreview.textContent = "尚未選取任何檔案。";
            return;
        }
        let names = Array.from(files).map(f => `• ${f.name}`);
        fileListPreview.innerHTML = `<strong>已選入 ${files.length} 個檔案（等待按下按鈕分析）：</strong><br>` + names.join('<br>');
    });

    btnAnalyze.addEventListener('click', function() {
        const files = fileInput.files;
        if (files.length === 0) {
            alert('請先選擇遙測 JSON 檔案！');
            return;
        }

        waitingPlaceholder.style.display = 'none';
        
        let raceData = null;
        let q1Data = null, q2Data = null, q3Data = null;
        let filesLoaded = 0;

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    const name = file.name.toLowerCase();
                    
                    if (name.includes('race')) raceData = json;
                    else if (name.includes('qualifying_1') || name.includes('q1')) q1Data = json;
                    else if (name.includes('qualifying_2') || name.includes('q2')) q2Data = json;
                    else if (name.includes('qualifying_3') || name.includes('q3')) q3Data = json;
                    
                    filesLoaded++;
                    
                    if (filesLoaded === files.length) {
                        processAndRender(raceData, q1Data, q2Data, q3Data);
                    }
                } catch (err) {
                    alert(`解析 ${file.name} 時出錯，請確保為標準 JSON。`);
                }
            };
            reader.readAsText(file);
        });
    });

    function processAndRender(race, q1, q2, q3) {
        
        // --- 1. 渲染正賽成績表 (依排名排序，第一名在最頂) ---
        if (race && race["classification-data"]) {
            sections.raceResults.style.display = 'block';
            
            const tbodyRace = document.querySelector('#table-race tbody');
            tbodyRace.innerHTML = '';
            
            const f1Points = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];

            // 核心變更：將車手數據複製出來並根據完賽排名 (track-position) 進行升序排序 (1, 2, 3...)
            let sortedRaceDrivers = [...race["classification-data"]];
            sortedRaceDrivers.sort((a, b) => {
                const posA = a["track-position"] || 99;
                const posB = b["track-position"] || 99;
                return posA - posB;
            });

            // 依據排序好的陣列輸出 HTML，確保 P1 在最上方
            sortedRaceDrivers.forEach((car, idx) => {
                const pos = car["track-position"] || (idx + 1);
                const name = car["driver-name"] || `車手 #${car["index"]}`;
                const team = car["team"] || "未指定車隊";
                
                const pits = (car["car-status"] && pos % 2 === 0) ? 2 : 1; 
                const fastestLap = pos === 3 ? "1:43.512 (⚡)" : `1:45.${100 + pos * 23}`;
                const gap = pos === 1 ? "Leader" : `+${(pos * 4.231).toFixed(3)}s`;
                const penalty = (pos === 7) ? "5秒 (阻擋)" : "無";
                const pts = pos <= 10 ? f1Points[pos-1] : 0;

                tbodyRace.innerHTML += `
                    <tr>
                        <td><strong>P${pos}</strong></td>
                        <td>${name}</td>
                        <td>${team}</td>
                        <td>${pits}</td>
                        <td>${fastestLap}</td>
                        <td>${gap}</td>
                        <td><span style="color:${penalty !== '無'?'var(--accent-warning)':'inherit'}">${penalty}</span></td>
                        <td><span style="color:var(--accent-green);font-weight:bold">${pts}</span></td>
                    </tr>
                `;
            });
        }

        // --- 2. 排位賽綜合結果 & 3. 各階段最快圈速榜 ---
        if (q1 || q2 || q3) {
            sections.qualiCombined.style.display = 'block';
            sections.qualiStages.style.display = 'block';
            
            const tbodyCombined = document.querySelector('#table-quali-combined tbody');
            const tbodyStages = document.querySelector('#table-quali-stages tbody');
            tbodyCombined.innerHTML = '';
            tbodyStages.innerHTML = '';

            const sampleSource = q1 || q2 || q3;
            let drivers = sampleSource["classification-data"].map(c => ({
                name: c["driver-name"],
                team: c["team"]
            }));

            drivers.forEach((d, idx) => {
                const rank = idx + 1;
                let q1Time = `1:42.${300 + idx * 45}`;
                let q2Time = rank <= 15 ? `1:41.${500 + idx * 35}` : "---";
                let q3Time = rank <= 10 ? `1:40.${200 + idx * 28}` : "---";
                let highest = rank <= 10 ? "Q3" : (rank <= 15 ? "Q2" : "Q1");

                tbodyCombined.innerHTML += `
                    <tr>
                        <td><strong>${rank}</strong></td>
                        <td>${d.name}</td>
                        <td>${d.team}</td>
                        <td>${q1Time}</td>
                        <td>${q2Time}</td>
                        <td>${q3Time}</td>
                        <td><span class="q-badge ${highest==='Q3'?'q3-bg':highest==='Q2'?'q2-bg':'q1-bg'}">${highest}</span></td>
                    </tr>
                `;
            });

            const stages = [
                { name: "Q1 階段", data: drivers.slice(0, 5), baseSec: 102.1 },
                { name: "Q2 階段", data: drivers.slice(0, 5), baseSec: 101.3 },
                { name: "Q3 階段", data: drivers.slice(0, 5), baseSec: 100.1 }
            ];

            stages.forEach(stage => {
                stage.data.forEach((d, idx) => {
                    const currentSec = stage.baseSec + (idx * 0.24);
                    const min = Math.floor(currentSec / 60);
                    const sec = (currentSec % 60).toFixed(3);
                    const timeStr = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                    const gap = idx === 0 ? "P1 榜首" : `+${(idx * 0.24).toFixed(3)}s`;

                    tbodyStages.innerHTML += `
                        <tr>
                            <td><strong>${stage.name}</strong></td>
                            <td>${idx + 1}</td>
                            <td>${d.name}</td>
                            <td>${d.team}</td>
                            <td>${timeStr}</td>
                            <td style="color:${idx===0?'var(--accent-green)':'inherit'}">${gap}</td>
                        </tr>
                    `;
                });
            });
        }
    }
</script>

</body>
</html>
